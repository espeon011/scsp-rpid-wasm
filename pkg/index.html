<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>SCSP RPID WASM</title>
</head>
<body>
    <h1>SCSP RPID WASM</h1>
    <textarea id="input" rows="10" cols="50" spellcheck="false" autocorrect="off" autocomplete="off" autocapitalize="off">
tkgnkuhmpxnhtqgxzvxis
iojiqfolnbxxcvsuqpvissbxf
ulcinycosovozpplp
igevazgbrddbcsvrvnngf
</textarea><br>
    <button id="do">Solve</button>

    <h2 id="output-title">Result</h2>
    <div id="output"></div>

    <script type="module">
        import init, { superseq } from "./scsp_rpid_wasm.js";

        init().then(() => {
            document.getElementById("do").onclick = () => {
                document.getElementById("output-title").textContent = "Computing...";
                document.getElementById("output").textContent = "";

                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        const start = performance.now();
                        const input = document.getElementById("input").value;
                        const result = superseq(input);
                        const end = performance.now();
                        const wall_time = Math.round((end - start) / 10) / 100;
                        document.getElementById("output").textContent = result.solution;
                        document.getElementById("output-title").textContent = `Result (primal bound: ${result.solution.length}, dual bound: ${result.dual_bound}, wall time: ${wall_time}s)`;
                    });
                });
            };
        });
    </script>
    <footer style="position:fixed; bottom:0; left:0.5em; right:0.5em; text-align:right; padding:0.5em; background:#fff; font-size:0.9em; color:#666;">
        <a href="https://github.com/espeon011/scsp-rpid-wasm">GitHub</a>
    </footer>
</body>
</html>
